; ESP32 Smart Shutter Hub — firmware build config
; Structural reference: HomeKey-ESP32 (PlatformIO project layout) — we stay on Arduino Core.
; See docs/decisions/0004-custom-firmware-vs-esphome.md
;
; v0.0.1 scaffold: on-device WiFi setup (WiFiManager AP + captive portal, creds in
; NVS) + mDNS + AsyncWebServer + ElegantOTA. No credentials compiled in.
; v0.2.0: LittleFS single-page web UI (sidebar shell served from data/), live log
; stream over WebSocket, MQTT broker config + Home Assistant discovery scaffold.
; Servos/PCA9685/HomeKit arrive in later phases (see docs/project-plan.md).

; Only the ESP32-D is built/released for now. The ESP32-C3 env is kept defined
; below but excluded from `pio run` until we explicitly bring it into a release.
[platformio]
default_envs = esp32dev

; Settings shared by every board target.
[env]
platform  = espressif32
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600
board_build.filesystem = littlefs   ; the v0.2.0 web UI lives in data/ (build/upload the FS image)

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    madhephaestus/ESP32Servo @ ^3.0.5   ; Phase-1 servo bench test (LEDC-backed Servo)
    knolleary/PubSubClient @ ^2.8       ; MQTT (blocking client; the web server is async
                                        ; on its own task, so UI stays responsive)
    ; OTA is our own custom page (Update.h from the core) — firmware + LittleFS,
    ; independent or together, with a version display and last-flash record.

build_flags =
    -D FW_VERSION=\"0.2.1\"
    -D MQTT_MAX_PACKET_SIZE=1024        ; HA discovery payloads exceed PubSubClient's 256B default

; ESP32-WROOM DevKit ("ESP32-D") — the project's primary/locked board
; (I2C pinout GPIO21 SDA / GPIO22 SCL). This is the reference build.
[env:esp32dev]
board = esp32dev

; ESP32-C3 DevKitM — DEFERRED. Not built or released yet (not in default_envs);
; will be re-enabled for a later release when the owner asks. NOTE: the C3 has a
; *different* pinout, so the servo/I2C GPIO map must be revisited before hardware
; phases target it. Build explicitly with:  pio run -e esp32-c3-devkitm-1
[env:esp32-c3-devkitm-1]
board = esp32-c3-devkitm-1
