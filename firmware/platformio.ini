; ESP32 Smart Shutter Hub — firmware build config
; Structural reference: HomeKey-ESP32 (PlatformIO project layout) — we stay on Arduino Core.
; See docs/decisions/0004-custom-firmware-vs-esphome.md and 0008-build-variants.md
;
; v0.0.1 scaffold: on-device WiFi setup (WiFiManager AP + captive portal, creds in
; NVS) + mDNS + AsyncWebServer + ElegantOTA. No credentials compiled in.
; v0.2.0: LittleFS single-page web UI (sidebar shell served from data/), live log
; stream over WebSocket, MQTT/HA discovery scaffold.
; v0.3.0: BUILD VARIANTS. The servo backend is a compile-time choice — direct GPIO
; (ESP32Servo, one bench servo) or PCA9685 (I2C 16-channel driver). Each board ×
; backend is its own env with a `FW_VARIANT` id that surfaces on the info/OTA
; screens and in the release artifact names, so an OTA bin is never ambiguous.

; --- Variant matrix (board × servo backend) -----------------------------------
;   esp32d-direct    ESP32-D  · direct GPIO   (ESP32Servo)     active
;   esp32d-pca9685   ESP32-D  · PCA9685 I2C   (Adafruit PWM)   active  ← current focus
;   esp32c3-direct   ESP32-C3 · direct GPIO                    deferred
;   esp32c3-pca9685  ESP32-C3 · PCA9685 I2C                    deferred
; Only the ESP32-D variants are built by default; the C3 envs are defined but kept
; out of `default_envs` until a release brings them in (the C3 has a different pinout,
; so its servo/I2C GPIO map must be revisited first). Releases build all four.
[platformio]
default_envs = esp32d-pca9685

; Settings shared by every board target.
[env]
platform  = espressif32
framework = arduino

monitor_speed  = 115200
upload_speed   = 921600
board_build.filesystem = littlefs   ; the web UI lives in data/ (build/upload the FS image)

lib_deps =
    tzapu/WiFiManager @ ^2.0.17
    ESP32Async/AsyncTCP @ ^3.3.2
    ESP32Async/ESPAsyncWebServer @ ^3.6.0
    madhephaestus/ESP32Servo @ ^3.0.5   ; direct-GPIO servo backend (USE_PCA9685=0)
    knolleary/PubSubClient @ ^2.8       ; MQTT (blocking client; the web server is async
                                        ; on its own task, so UI stays responsive)
    adafruit/Adafruit PWM Servo Driver Library @ ^2.4.0   ; PCA9685 backend (USE_PCA9685=1)
    homespan/HomeSpan @ ~1.9.1           ; Apple HomeKit bridge (Phase 5) — native HAP, no hub.
                                         ; Pinned to 1.9.x: the last line supporting arduino-esp32
                                         ; core 2.0.9 (HomeSpan 2.x requires core >= 3.3.0).
    ; OTA is our own custom page (Update.h from the core) — firmware + LittleFS,
    ; independent or together, with a version display and last-flash record.

build_flags =
    -D FW_VERSION=\"0.5.2\"
    -D MQTT_MAX_PACKET_SIZE=1024        ; HA discovery payloads exceed PubSubClient's 256B default

; --- Servo-backend mixins (referenced by the variant envs below) ---------------
[backend_direct]
build_flags = -D USE_PCA9685=0
[backend_pca9685]
build_flags = -D USE_PCA9685=1

; --- ESP32-WROOM DevKit ("ESP32-D") — the project's primary/locked board --------
; (I2C pinout GPIO21 SDA / GPIO22 SCL). These are the reference builds.
[env:esp32d-direct]
board = esp32dev
build_flags = ${env.build_flags} ${backend_direct.build_flags} -D FW_VARIANT=\"esp32d-direct\"

[env:esp32d-pca9685]
board = esp32dev
build_flags = ${env.build_flags} ${backend_pca9685.build_flags} -D FW_VARIANT=\"esp32d-pca9685\"

; --- ESP32-C3 DevKitM — DEFERRED ------------------------------------------------
; Not in default_envs, so `pio run` skips them. The C3 has a *different* pinout, so
; the servo/I2C GPIO map must be revisited before these ship. Build explicitly with:
;   pio run -e esp32c3-direct     /     pio run -e esp32c3-pca9685
[env:esp32c3-direct]
board = esp32-c3-devkitm-1
build_flags = ${env.build_flags} ${backend_direct.build_flags} -D FW_VARIANT=\"esp32c3-direct\"

[env:esp32c3-pca9685]
board = esp32-c3-devkitm-1
build_flags = ${env.build_flags} ${backend_pca9685.build_flags} -D FW_VARIANT=\"esp32c3-pca9685\"
