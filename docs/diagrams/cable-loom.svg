<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="560" fill="#ffffff"/>
  <style>
    .t{fill:#1c2430;font-size:13px}.ts{fill:#4a5568;font-size:12px}.tt{fill:#4a5568;font-size:11px}.tb{fill:#1c2430;font-size:14px;font-weight:bold}.title{fill:#1c2430;font-size:17px;font-weight:bold}
    .con{fill:#ffffff;stroke:#333;stroke-width:2}.dst{fill:#f4f6fb;stroke:#3a5a8c;stroke-width:2}.pin{fill:#ccc;stroke:#666;stroke-width:1}
  </style>

  <text x="340" y="28" text-anchor="middle" class="title">Cable loom — connectors and pinouts</text>

  <rect class="con" x="60" y="70" width="110" height="78" rx="4"/>
  <text x="105" y="102" text-anchor="middle" class="tb">J2</text>
  <text x="105" y="120" text-anchor="middle" class="ts">JST-XH 5</text>
  <rect class="pin" x="164" y="78" width="10" height="8"/>
  <rect class="pin" x="164" y="92" width="10" height="8"/>
  <rect class="pin" x="164" y="106" width="10" height="8"/>
  <rect class="pin" x="164" y="120" width="10" height="8"/>
  <rect class="pin" x="164" y="134" width="10" height="8"/>
  <line x1="174" y1="82" x2="430" y2="82" stroke="#8a3fd6" stroke-width="2.5"/>
  <line x1="174" y1="96" x2="430" y2="96" stroke="#22303c" stroke-width="2.5"/>
  <line x1="174" y1="110" x2="430" y2="110" stroke="#1f6fd6" stroke-width="2.5"/>
  <line x1="174" y1="124" x2="430" y2="124" stroke="#1f6fd6" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="174" y1="138" x2="430" y2="138" stroke="#90a4ae" stroke-width="2.5"/>
  <text x="182" y="78" class="tt" fill="#8a3fd6">3V3</text>
  <text x="182" y="92" class="tt" fill="#22303c">GND</text>
  <text x="182" y="106" class="tt" fill="#1f6fd6">SDA</text>
  <text x="182" y="120" class="tt" fill="#1f6fd6">SCL</text>
  <text x="182" y="134" class="tt" fill="#78909c">OE (optional)</text>
  <rect class="dst" x="430" y="70" width="200" height="78" rx="4"/>
  <text x="530" y="102" text-anchor="middle" class="tb">PCA9685 logic header</text>
  <text x="530" y="122" text-anchor="middle" class="ts">VCC · GND · SDA · SCL · OE</text>
  <text x="60" y="176" class="ts">short run (~0.15 m) · latched and polarised — a reversed 3V3/GND cannot happen</text>

  <rect class="con" x="60" y="200" width="110" height="64" rx="4"/>
  <text x="105" y="226" text-anchor="middle" class="tb">J3</text>
  <text x="105" y="244" text-anchor="middle" class="ts">JST-XH 4</text>
  <rect class="pin" x="164" y="206" width="10" height="8"/>
  <rect class="pin" x="164" y="220" width="10" height="8"/>
  <rect class="pin" x="164" y="234" width="10" height="8"/>
  <rect class="pin" x="164" y="248" width="10" height="8"/>
  <line x1="174" y1="210" x2="430" y2="210" stroke="#8a3fd6" stroke-width="2.5"/>
  <line x1="174" y1="224" x2="430" y2="224" stroke="#22303c" stroke-width="2.5"/>
  <line x1="174" y1="238" x2="430" y2="238" stroke="#1f6fd6" stroke-width="2.5"/>
  <line x1="174" y1="252" x2="430" y2="252" stroke="#1f6fd6" stroke-width="2.5" stroke-dasharray="6 4"/>
  <text x="182" y="206" class="tt" fill="#8a3fd6">3V3</text>
  <text x="182" y="220" class="tt" fill="#22303c">GND</text>
  <text x="182" y="234" class="tt" fill="#1f6fd6">SDA</text>
  <text x="182" y="248" class="tt" fill="#1f6fd6">SCL</text>
  <rect class="dst" x="430" y="200" width="200" height="64" rx="4"/>
  <text x="530" y="226" text-anchor="middle" class="tb">VEML7700 breakout</text>
  <text x="530" y="246" text-anchor="middle" class="ts">remote, at the light window</text>
  <text x="60" y="292" class="ts">0.3–0.5 m four-core — ribbon or twisted, both fine at 100 kHz I2C</text>

  <rect class="con" x="60" y="316" width="110" height="52" rx="4"/>
  <text x="105" y="338" text-anchor="middle" class="tb">servo plug</text>
  <text x="105" y="356" text-anchor="middle" class="ts">3-pin 0.1"</text>
  <rect class="pin" x="164" y="322" width="10" height="8"/>
  <rect class="pin" x="164" y="338" width="10" height="8"/>
  <rect class="pin" x="164" y="354" width="10" height="8"/>
  <line x1="174" y1="326" x2="430" y2="326" stroke="#6d4c41" stroke-width="2.5"/>
  <line x1="174" y1="342" x2="430" y2="342" stroke="#d63b3b" stroke-width="2.5"/>
  <line x1="174" y1="358" x2="430" y2="358" stroke="#e08a1e" stroke-width="2.5"/>
  <text x="182" y="322" class="tt" fill="#6d4c41">GND (brown)</text>
  <text x="182" y="338" class="tt" fill="#d63b3b">V+ (red)</text>
  <text x="182" y="354" class="tt" fill="#e08a1e">PWM (orange)</text>
  <rect class="dst" x="430" y="316" width="200" height="52" rx="4"/>
  <text x="530" y="338" text-anchor="middle" class="tb">PCA9685 CH0–3</text>
  <text x="530" y="358" text-anchor="middle" class="ts">plugs straight on — no adapter</text>
  <text x="60" y="396" class="ts">orientation: brown (GND) towards the board edge · extensions exit through grommets</text>

  <rect x="60" y="424" width="110" height="90" rx="4" fill="#fff3e8" stroke="#c07a2a" stroke-width="2"/>
  <text x="115" y="462" text-anchor="middle" class="tb">XL4015 out</text>
  <text x="115" y="480" text-anchor="middle" class="ts">5.1 V</text>
  <line x1="170" y1="440" x2="430" y2="440" stroke="#d63b3b" stroke-width="5"/>
  <line x1="170" y1="454" x2="430" y2="454" stroke="#22303c" stroke-width="5"/>
  <text x="250" y="435" class="tt">18 AWG + ferrules</text>
  <rect class="dst" x="430" y="424" width="200" height="44" rx="4"/>
  <text x="530" y="442" text-anchor="middle" class="t">PCA9685 V+ screw terminal</text>
  <text x="530" y="460" text-anchor="middle" class="ts">bulk cap at this end</text>
  <line x1="170" y1="490" x2="430" y2="490" stroke="#d63b3b" stroke-width="2"/>
  <line x1="170" y1="502" x2="430" y2="502" stroke="#22303c" stroke-width="2"/>
  <text x="250" y="485" class="tt">22 AWG</text>
  <rect class="dst" x="430" y="476" width="200" height="40" rx="4"/>
  <text x="530" y="500" text-anchor="middle" class="t">J1 breadboard spur</text>

  <text x="60" y="544" class="ts" fill="#b02a2a">never Dupont for power — bench probing only</text>
</svg>
