<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 830" font-family="Segoe UI, system-ui, Arial, sans-serif">
  <!-- ESP32 Shutter Hub — web UI mockup: Shutters (blind calibration) page.
       Sibling to the low-level "Servo test" page (old Actions tab); both appear
       in the sidebar as separate jobs. Colours mirror firmware/data/style.css. -->
  <rect width="1040" height="830" fill="#0e1017"/>
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#232836"/><stop offset="1" stop-color="#171a24"/>
    </linearGradient>
  </defs>
  <style>
    .txt{fill:#e7e9f0}.mut{fill:#8b90a2}.pink{fill:#ec4899}.teal{fill:#2dd4bf}.green{fill:#22c55e}
    .h1{fill:#ffffff;font-size:26px;font-weight:700}.sub{fill:#8b90a2;font-size:13px}
    .card{fill:#171a24;stroke:#2a2f3d;stroke-width:1}
    .row{fill:#1e222e;stroke:#2a2f3d;stroke-width:1}
    .row2{fill:#232836;stroke:#2a2f3d;stroke-width:1}
    .navtxt{fill:#8b90a2;font-size:14px;font-weight:500}
    .cardh{fill:#e7e9f0;font-size:15px;font-weight:600}.cardp{fill:#8b90a2;font-size:11px}
    .lbl{fill:#8b90a2;font-size:11px}.val{fill:#e7e9f0;font-size:14px}
    .btnt{fill:#e7e9f0;font-size:12px;font-weight:600}.btntp{fill:#ffffff;font-size:12px;font-weight:600}
  </style>

  <!-- ===== Sidebar ===== -->
  <rect x="0" y="0" width="230" height="830" fill="#0b0d13"/>
  <line x1="230" y1="0" x2="230" y2="830" stroke="#2a2f3d"/>
  <rect x="18" y="22" width="40" height="40" rx="11" fill="url(#logo)" stroke="#2a2f3d"/>
  <text x="38" y="48" text-anchor="middle" class="teal" font-size="15" font-weight="700">SH</text>
  <text x="70" y="40" class="txt" font-size="15" font-weight="600">Shutter Hub</text>
  <circle cx="74" cy="54" r="4" fill="#22c55e"/>
  <text x="84" y="58" class="mut" font-size="11">online</text>
  <line x1="14" y1="78" x2="216" y2="78" stroke="#2a2f3d"/>

  <!-- nav items -->
  <text x="30" y="112" class="navtxt">ⓘ&#160;&#160;&#160;Info</text>
  <text x="30" y="152" class="navtxt">((•))&#160;&#160;MQTT</text>
  <!-- Servo test (renamed from Actions) -->
  <text x="30" y="192" class="navtxt">⚡&#160;&#160;&#160;Servo test</text>
  <!-- Shutters — ACTIVE -->
  <rect x="14" y="208" width="202" height="40" rx="9" fill="#232836"/>
  <text x="30" y="233" fill="#ffffff" font-size="14" font-weight="600">⧉&#160;&#160;&#160;Shutters</text>
  <text x="30" y="273" class="navtxt">☀&#160;&#160;&#160;Solar</text>
  <text x="30" y="313" class="navtxt">⚙&#160;&#160;&#160;System</text>
  <text x="30" y="353" class="navtxt">⬆&#160;&#160;&#160;OTA Update</text>
  <text x="30" y="393" class="navtxt">▤&#160;&#160;&#160;Logs</text>
  <text x="30" y="808" class="mut" font-size="11">firmware v0.6.0</text>

  <!-- callout: two separate pages -->
  <rect x="14" y="176" width="202" height="72" rx="9" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="238" y="196" fill="#f59e0b" font-size="11">Two distinct jobs:</text>
  <text x="238" y="212" fill="#f59e0b" font-size="11">• Servo test — raw GPIO bench</text>
  <text x="238" y="228" fill="#f59e0b" font-size="11">&#160;&#160;diagnostic (old Actions)</text>
  <text x="238" y="244" fill="#f59e0b" font-size="11">• Shutters — per-blind calibration</text>

  <!-- ===== Main / page title ===== -->
  <text x="262" y="52" class="h1">Shutters</text>
  <text x="262" y="76" class="sub">Define each shutter and calibrate its travel — closed, open and saved positions.</text>

  <!-- ===== Card 1: Shutter selector ===== -->
  <rect x="262" y="96" width="746" height="128" rx="14" class="card"/>
  <text x="284" y="126" class="cardh">Shutter</text>
  <text x="284" y="144" class="cardp">Pick a shutter to calibrate, or add a new one</text>
  <!-- dropdown -->
  <rect x="284" y="156" width="240" height="38" rx="9" class="row"/>
  <text x="298" y="180" class="val">Front room – left</text>
  <text x="506" y="180" class="mut" font-size="13">▾</text>
  <!-- buttons -->
  <rect x="536" y="156" width="118" height="38" rx="9" fill="#ec4899"/>
  <text x="595" y="180" text-anchor="middle" class="btntp">+ Add shutter</text>
  <rect x="664" y="156" width="86" height="38" rx="9" class="row2"/>
  <text x="707" y="180" text-anchor="middle" class="btnt">Rename</text>
  <rect x="760" y="156" width="86" height="38" rx="9" fill="none" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="803" y="180" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">Delete</text>
  <!-- status + slug + channel -->
  <circle cx="866" cy="130" r="4" fill="#22c55e"/>
  <text x="876" y="134" class="green" font-size="12" font-weight="600">calibrated</text>
  <text x="988" y="134" text-anchor="end" class="mut" font-size="12">slug: front_left</text>
  <text x="866" y="176" class="lbl">PCA9685 channel</text>
  <rect x="866" y="182" width="122" height="30" rx="8" class="row"/>
  <text x="878" y="202" class="val" font-size="13">0</text>
  <text x="978" y="202" class="mut" font-size="12">▾</text>

  <!-- ===== Card 2: Position / calibration ===== -->
  <rect x="262" y="240" width="746" height="356" rx="14" class="card"/>
  <text x="284" y="270" class="cardh">Position &amp; calibration</text>
  <text x="284" y="288" class="cardp">Slow-run to get close, Stop, then nudge frame-by-frame to land it</text>

  <!-- live readout -->
  <text x="284" y="336" class="teal" font-size="36" font-weight="700">1500 µs</text>
  <rect x="470" y="312" width="78" height="30" rx="8" class="row2"/>
  <text x="509" y="332" text-anchor="middle" class="txt" font-size="15" font-weight="700">52%</text>
  <text x="556" y="332" class="mut" font-size="12">of calibrated travel</text>

  <!-- scrubber track -->
  <rect x="284" y="362" width="700" height="10" rx="5" fill="#232836"/>
  <!-- calibrated band closed..open -->
  <rect x="360" y="362" width="530" height="10" rx="5" fill="#2dd4bf" fill-opacity="0.20"/>
  <!-- endpoint ticks -->
  <line x1="360" y1="356" x2="360" y2="378" stroke="#8b90a2" stroke-width="1.5"/>
  <line x1="890" y1="356" x2="890" y2="378" stroke="#8b90a2" stroke-width="1.5"/>
  <!-- handle -->
  <circle cx="640" cy="367" r="10" fill="#ec4899" stroke="#0e1017" stroke-width="2"/>
  <text x="284" y="392" class="mut" font-size="11">500 µs (min)</text>
  <text x="360" y="392" text-anchor="middle" class="mut" font-size="11">◉ closed 900</text>
  <text x="890" y="392" text-anchor="middle" class="mut" font-size="11">open 2100 ◉</text>
  <text x="984" y="392" text-anchor="end" class="mut" font-size="11">2500 µs (max)</text>

  <!-- transport cluster -->
  <g>
    <!-- nudge minus -->
    <rect x="336" y="410" width="86" height="46" rx="10" class="row2"/>
    <text x="379" y="439" text-anchor="middle" class="txt" font-size="18">⏮</text>
    <text x="379" y="472" text-anchor="middle" class="mut" font-size="10">nudge −</text>
    <!-- slow close -->
    <rect x="430" y="410" width="86" height="46" rx="10" class="row2"/>
    <text x="473" y="439" text-anchor="middle" class="txt" font-size="16">◀◀</text>
    <text x="473" y="472" text-anchor="middle" class="mut" font-size="10">slow close</text>
    <!-- stop -->
    <rect x="524" y="410" width="86" height="46" rx="10" fill="#ec4899"/>
    <text x="567" y="440" text-anchor="middle" fill="#ffffff" font-size="18">⏸</text>
    <text x="567" y="472" text-anchor="middle" class="mut" font-size="10">STOP</text>
    <!-- slow open -->
    <rect x="618" y="410" width="86" height="46" rx="10" class="row2"/>
    <text x="661" y="439" text-anchor="middle" class="txt" font-size="16">▶▶</text>
    <text x="661" y="472" text-anchor="middle" class="mut" font-size="10">slow open</text>
    <!-- nudge plus -->
    <rect x="712" y="410" width="86" height="46" rx="10" class="row2"/>
    <text x="755" y="439" text-anchor="middle" class="txt" font-size="18">⏭</text>
    <text x="755" y="472" text-anchor="middle" class="mut" font-size="10">nudge +</text>
  </g>

  <!-- step size + speed -->
  <text x="284" y="510" class="lbl">Nudge step</text>
  <rect x="284" y="518" width="86" height="34" rx="8" fill="#ec4899"/>
  <text x="327" y="540" text-anchor="middle" class="btntp">Fine 5µs</text>
  <rect x="376" y="518" width="98" height="34" rx="8" class="row2"/>
  <text x="425" y="540" text-anchor="middle" class="btnt">Coarse 25µs</text>
  <text x="560" y="510" class="lbl">Slow-run speed</text>
  <rect x="560" y="530" width="424" height="6" rx="3" fill="#232836"/>
  <rect x="560" y="530" width="120" height="6" rx="3" fill="#2dd4bf"/>
  <circle cx="680" cy="533" r="8" fill="#e7e9f0"/>
  <text x="984" y="513" text-anchor="end" class="mut" font-size="11">25 °/s</text>

  <!-- endpoints set row -->
  <line x1="284" y1="566" x2="984" y2="566" stroke="#2a2f3d"/>
  <text x="284" y="588" class="lbl">CLOSED</text>
  <text x="284" y="588" class="lbl"></text>
  <text x="342" y="588" class="val" font-size="13">900 µs</text>
  <rect x="412" y="574" width="96" height="26" rx="8" class="row2"/>
  <text x="460" y="591" text-anchor="middle" class="btnt">Set closed</text>
  <text x="560" y="588" class="lbl">OPEN</text>
  <text x="606" y="588" class="val" font-size="13">2100 µs</text>
  <rect x="684" y="574" width="90" height="26" rx="8" class="row2"/>
  <text x="729" y="591" text-anchor="middle" class="btnt">Set open</text>
  <rect x="884" y="574" width="100" height="26" rx="8" fill="none" stroke="#2a2f3d"/>
  <text x="934" y="591" text-anchor="middle" class="mut" font-size="12">Test travel ▸</text>

  <!-- ===== Card 3: Saved positions ===== -->
  <rect x="262" y="612" width="746" height="122" rx="14" class="card"/>
  <text x="284" y="642" class="cardh">Saved positions</text>
  <text x="284" y="660" class="cardp">Two named favourites recalled by Home Assistant / solar logic</text>
  <!-- daylight row -->
  <circle cx="290" cy="686" r="5" fill="#f59e0b"/>
  <text x="304" y="690" class="val" font-size="13">Daylight</text>
  <text x="420" y="690" class="mut" font-size="13">1650 µs · 62%</text>
  <rect x="770" y="674" width="72" height="30" rx="8" fill="#ec4899"/>
  <text x="806" y="694" text-anchor="middle" class="btntp">Go</text>
  <rect x="852" y="674" width="132" height="30" rx="8" class="row2"/>
  <text x="918" y="694" text-anchor="middle" class="btnt">Save current</text>
  <!-- privacy row -->
  <circle cx="290" cy="716" r="5" fill="#60a5fa"/>
  <text x="304" y="720" class="val" font-size="13">Privacy</text>
  <text x="420" y="720" class="mut" font-size="13">1050 µs · 12%</text>
  <rect x="770" y="708" width="72" height="20" rx="8" fill="#ec4899" opacity="0.9"/>
  <text x="806" y="722" text-anchor="middle" class="btntp">Go</text>
  <rect x="852" y="708" width="132" height="20" rx="8" class="row2"/>
  <text x="918" y="722" text-anchor="middle" class="btnt">Save current</text>

  <!-- ===== footer actions ===== -->
  <rect x="262" y="750" width="150" height="42" rx="9" fill="#ec4899"/>
  <text x="337" y="776" text-anchor="middle" class="btntp">Save shutter</text>
  <rect x="422" y="750" width="96" height="42" rx="9" class="row2"/>
  <text x="470" y="776" text-anchor="middle" class="btnt">Revert</text>
  <rect x="528" y="750" width="150" height="42" rx="9" fill="none" stroke="#ef4444" stroke-opacity="0.5"/>
  <text x="603" y="776" text-anchor="middle" fill="#f87171" font-size="12" font-weight="600">Detach (release)</text>
  <circle cx="700" cy="771" r="4" fill="#22c55e"/>
  <text x="712" y="775" class="green" font-size="12">Saved to NVS</text>
</svg>
