<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>
  <style>
    .box  { fill:#f4f6fb; stroke:#3a5a8c; stroke-width:2; }
    .pwr  { fill:#fff3e8; stroke:#c07a2a; stroke-width:2; }
    .mcu  { fill:#eaf1ff; stroke:#1f4e9c; stroke-width:2.5; }
    .srv  { fill:#eef7ee; stroke:#3f8a3f; stroke-width:2; }
    .tb   { fill:#1c2430; font-size:15px; font-weight:bold; }
    .t    { fill:#1c2430; font-size:13px; }
    .ts   { fill:#4a5568; font-size:11px; }
    .v5   { stroke:#d63b3b; stroke-width:3; fill:none; }   /* +5.1V red */
    .gnd  { stroke:#222; stroke-width:3; fill:none; }        /* GND black */
    .v12  { stroke:#e08a1e; stroke-width:3; fill:none; }     /* 12V orange */
    .i2c  { stroke:#1f6fd6; stroke-width:2.5; fill:none; }   /* I2C blue */
    .pwm  { stroke:#3f8a3f; stroke-width:2.5; fill:none; }   /* PWM green */
    .lab  { font-size:11px; }
  </style>

  <text x="450" y="28" text-anchor="middle" class="tb" font-size="19">Shutter Hub — Power &amp; Wiring Diagram</text>

  <!-- Power chain (left column) -->
  <rect class="pwr" x="40" y="60"  width="180" height="52" rx="6"/>
  <text x="130" y="82"  text-anchor="middle" class="t">USB-C PD charger</text>
  <text x="130" y="100" text-anchor="middle" class="ts">30 W+</text>

  <rect class="pwr" x="40" y="150" width="180" height="52" rx="6"/>
  <text x="130" y="172" text-anchor="middle" class="t">AITRIP PD trigger</text>
  <text x="130" y="190" text-anchor="middle" class="ts">set to 12 V</text>

  <rect class="pwr" x="40" y="250" width="180" height="60" rx="6"/>
  <text x="130" y="274" text-anchor="middle" class="t">XL4015 buck</text>
  <text x="130" y="292" text-anchor="middle" class="ts">adjust to 5.1 V (~5 A)</text>

  <path class="v12" d="M130,112 L130,150"/>
  <text x="138" y="132" class="lab" fill="#c07a2a">USB-C PD</text>
  <path class="v12" d="M130,202 L130,250"/>
  <text x="138" y="228" class="lab" fill="#c07a2a">12 V</text>

  <!-- Rails -->
  <path class="v5"  d="M130,310 L130,360 L860,360"/>
  <text x="150" y="352" class="lab" fill="#d63b3b" font-weight="bold">+5.1 V rail</text>
  <path class="gnd" d="M90,310 L90,600 L860,600"/>
  <text x="150" y="592" class="lab" font-weight="bold">GND (single-point common)</text>

  <!-- ESP32-D -->
  <rect class="mcu" x="250" y="400" width="170" height="90" rx="8"/>
  <text x="335" y="426" text-anchor="middle" class="tb">ESP32-D</text>
  <text x="335" y="448" text-anchor="middle" class="ts">VIN · GND</text>
  <text x="335" y="466" text-anchor="middle" class="ts">GPIO21 SDA · GPIO22 SCL</text>
  <text x="335" y="483" text-anchor="middle" class="ts">GPIO34 rail sense (opt)</text>
  <path class="v5"  d="M300,360 L300,400"/>
  <path class="gnd" d="M360,490 L360,600"/>

  <!-- PCA9685 -->
  <rect class="box" x="470" y="400" width="160" height="90" rx="8"/>
  <text x="550" y="426" text-anchor="middle" class="tb">PCA9685</text>
  <text x="550" y="446" text-anchor="middle" class="ts">16-ch servo driver</text>
  <text x="550" y="463" text-anchor="middle" class="ts">I2C 0x40</text>
  <text x="550" y="480" text-anchor="middle" class="ts">V+ · SDA · SCL</text>
  <path class="v5"  d="M500,360 L500,400"/>
  <path class="gnd" d="M600,490 L600,600"/>

  <!-- Bulk cap -->
  <path class="v5"  d="M660,360 L660,400"/>
  <path class="gnd" d="M660,470 L660,600"/>
  <rect x="648" y="400" width="24" height="14" fill="#d63b3b"/>
  <rect x="648" y="418" width="24" height="14" fill="#222"/>
  <text x="678" y="418" class="ts">1000–2200 µF</text>
  <text x="678" y="432" class="ts">≥10 V (servo rail)</text>

  <!-- VEML7700 -->
  <rect class="box" x="250" y="120" width="170" height="60" rx="8"/>
  <text x="335" y="144" text-anchor="middle" class="tb">VEML7700</text>
  <text x="335" y="164" text-anchor="middle" class="ts">light sensor · I2C 0x10</text>

  <!-- I2C bus: ESP32 -> PCA9685 and -> VEML7700 -->
  <path class="i2c" d="M420,440 L470,440"/>
  <text x="430" y="432" class="lab" fill="#1f6fd6">I2C</text>
  <path class="i2c" d="M335,400 L335,180"/>
  <text x="343" y="300" class="lab" fill="#1f6fd6">I2C (shared bus)</text>

  <!-- Servos -->
  <g>
    <rect class="srv" x="700" y="150" width="150" height="40" rx="6"/>
    <text x="775" y="175" text-anchor="middle" class="t">MG90D — Left (CH0)</text>
    <rect class="srv" x="700" y="200" width="150" height="40" rx="6"/>
    <text x="775" y="225" text-anchor="middle" class="t">MG90D — L.Ctr (CH1)</text>
    <rect class="srv" x="700" y="250" width="150" height="40" rx="6"/>
    <text x="775" y="275" text-anchor="middle" class="t">MG90D — R.Ctr (CH2)</text>
    <rect class="srv" x="700" y="300" width="150" height="40" rx="6"/>
    <text x="775" y="325" text-anchor="middle" class="t">MG90D — Right (CH3)</text>
  </g>

  <!-- PWM from PCA9685 to servos -->
  <g>
    <path class="pwm" d="M630,430 L680,170 L700,170"/>
    <path class="pwm" d="M630,435 L680,220 L700,220"/>
    <path class="pwm" d="M630,445 L680,270 L700,270"/>
    <path class="pwm" d="M630,455 L680,320 L700,320"/>
  </g>
  <text x="648" y="360" class="lab" fill="#3f8a3f">PWM CH0–3</text>

  <!-- Servo power taps (red/black) to servo block region -->
  <path class="v5"  d="M775,150 L775,140 L690,140 L690,360"/>
  <text x="700" y="134" class="lab" fill="#d63b3b">+5.1 V</text>
  <path class="gnd" d="M850,340 L868,340 L868,600" />
  <text x="840" y="358" class="lab" text-anchor="end">GND</text>

  <!-- Legend -->
  <g transform="translate(40,470)">
    <text x="0" y="0" class="ts" font-weight="bold">Legend</text>
    <line x1="0" y1="14" x2="26" y2="14" class="v12"/>  <text x="32" y="18" class="ts">12 V</text>
    <line x1="0" y1="32" x2="26" y2="32" class="v5"/>   <text x="32" y="36" class="ts">+5.1 V</text>
    <line x1="0" y1="50" x2="26" y2="50" class="gnd"/>  <text x="32" y="54" class="ts">GND</text>
    <line x1="90" y1="14" x2="116" y2="14" class="i2c"/> <text x="122" y="18" class="ts">I2C</text>
    <line x1="90" y1="32" x2="116" y2="32" class="pwm"/> <text x="122" y="36" class="ts">PWM</text>
  </g>

  <text x="450" y="628" text-anchor="middle" class="ts">Set XL4015 to 5.1 V before connecting loads · servos powered from the buck rail, not through the ESP32 · stagger servo start-up.</text>
</svg>
