<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="650" fill="#ffffff"/>
  <defs>
    <marker id="wah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#e08a1e"/>
    </marker>
  </defs>
  <style>
    .pwr  { fill:#fff3e8; stroke:#c07a2a; stroke-width:2; }
    .box  { fill:#f4f6fb; stroke:#3a5a8c; stroke-width:2; }
    .mcu  { fill:#eaf1ff; stroke:#1f4e9c; stroke-width:2.5; }
    .srv  { fill:#eef7ee; stroke:#3f8a3f; stroke-width:2; }
    .title{ fill:#1c2430; font-size:19px; font-weight:bold; }
    .tb   { fill:#1c2430; font-size:15px; font-weight:bold; }
    .t    { fill:#1c2430; font-size:13px; }
    .ts   { fill:#4a5568; font-size:12px; }
    .v5   { stroke:#d63b3b; stroke-width:3; fill:none; }
    .gnd  { stroke:#222;    stroke-width:3; fill:none; }
    .v12  { stroke:#e08a1e; stroke-width:3; fill:none; }
    .i2c  { stroke:#1f6fd6; stroke-width:2.5; fill:none; }
    .pwm  { stroke:#3f8a3f; stroke-width:2.5; fill:none; }
    .lab  { font-size:12px; }
  </style>

  <text x="450" y="30" text-anchor="middle" class="title">Shutter Hub — Power &amp; Wiring Diagram</text>

  <!-- ===== power chain (left) ===== -->
  <rect class="pwr" x="40" y="70"  width="180" height="52" rx="6"/>
  <text x="130" y="92"  text-anchor="middle" class="t">USB-C PD charger</text>
  <text x="130" y="110" text-anchor="middle" class="ts">30 W+</text>

  <rect class="pwr" x="40" y="162" width="180" height="52" rx="6"/>
  <text x="130" y="184" text-anchor="middle" class="t">AITRIP PD trigger</text>
  <text x="130" y="202" text-anchor="middle" class="ts">set to 12 V</text>

  <rect class="pwr" x="40" y="258" width="180" height="60" rx="6"/>
  <text x="130" y="282" text-anchor="middle" class="t">XL4015 buck</text>
  <text x="130" y="300" text-anchor="middle" class="ts">adjust to 5.1 V (~5 A)</text>

  <path class="v12" d="M130,122 L130,160" marker-end="url(#wah)"/>
  <text x="138" y="146" class="lab" fill="#c07a2a">USB-C PD</text>
  <path class="v12" d="M130,214 L130,256" marker-end="url(#wah)"/>
  <text x="138" y="240" class="lab" fill="#c07a2a">12 V</text>

  <!-- ===== rails ===== -->
  <path class="v5"  d="M130,318 L130,362 L860,362"/>
  <text x="240" y="354" class="lab" fill="#d63b3b" font-weight="bold">+5.1 V rail</text>
  <path class="gnd" d="M95,318 L95,610 L860,610"/>
  <text x="240" y="602" class="lab" font-weight="bold">GND — single-point common</text>

  <!-- ===== VEML7700 (top middle) ===== -->
  <rect class="box" x="250" y="150" width="180" height="58" rx="8"/>
  <text x="340" y="174" text-anchor="middle" class="tb">VEML7700</text>
  <text x="340" y="194" text-anchor="middle" class="ts">light sensor · I2C 0x10</text>

  <!-- ===== loads row ===== -->
  <!-- ESP32 -->
  <rect class="mcu" x="255" y="405" width="175" height="98" rx="8"/>
  <text x="342" y="430" text-anchor="middle" class="tb">ESP32-D</text>
  <text x="342" y="452" text-anchor="middle" class="ts">VIN · GND</text>
  <text x="342" y="470" text-anchor="middle" class="ts">GPIO21 SDA · GPIO22 SCL</text>
  <text x="342" y="488" text-anchor="middle" class="ts">GPIO34 rail sense (opt)</text>
  <path class="v5"  d="M290,405 L290,362"/>
  <path class="gnd" d="M395,503 L395,610"/>

  <!-- PCA9685 -->
  <rect class="box" x="470" y="405" width="160" height="98" rx="8"/>
  <text x="550" y="430" text-anchor="middle" class="tb">PCA9685</text>
  <text x="550" y="451" text-anchor="middle" class="ts">16-ch servo driver</text>
  <text x="550" y="469" text-anchor="middle" class="ts">I2C 0x40</text>
  <text x="550" y="487" text-anchor="middle" class="ts">V+ · SDA · SCL</text>
  <path class="v5"  d="M505,405 L505,362"/>
  <path class="gnd" d="M600,503 L600,610"/>

  <!-- Servo (shown once, xN) -->
  <rect class="srv" x="690" y="405" width="170" height="98" rx="8"/>
  <text x="775" y="430" text-anchor="middle" class="tb">MG90D  × N</text>
  <text x="775" y="451" text-anchor="middle" class="ts">one per shutter</text>
  <text x="775" y="469" text-anchor="middle" class="ts">CH0–CH3 …</text>
  <text x="775" y="487" text-anchor="middle" class="ts">+5.1 V · GND · PWM</text>
  <path class="v5"  d="M720,405 L720,362"/>
  <path class="gnd" d="M830,503 L830,610"/>

  <!-- bulk cap on rail between PCA9685 and servo -->
  <line class="v5"  x1="660" y1="362" x2="660" y2="408"/>
  <line x1="644" y1="408" x2="676" y2="408" stroke="#d63b3b" stroke-width="4"/>
  <line x1="648" y1="418" x2="672" y2="418" stroke="#222" stroke-width="4"/>
  <line class="gnd" x1="660" y1="418" x2="660" y2="470"/>
  <path class="gnd" d="M660,470 L660,610"/>
  <text x="660" y="540" text-anchor="middle" class="ts">1000–2200 µF</text>
  <text x="660" y="556" text-anchor="middle" class="ts">≥10 V bulk cap</text>

  <!-- ===== I2C bus ===== -->
  <path class="i2c" d="M430,455 L470,455"/>
  <text x="435" y="447" class="lab" fill="#1f6fd6">I2C</text>
  <path class="i2c" d="M340,405 L340,208"/>
  <text x="348" y="320" class="lab" fill="#1f6fd6">I2C (shared bus)</text>

  <!-- ===== PWM ===== -->
  <path class="pwm" d="M630,450 L690,450"/>
  <text x="638" y="442" class="lab" fill="#3f8a3f">PWM CH0–3</text>

  <!-- ===== legend ===== -->
  <g transform="translate(40,470)">
    <text x="0" y="0" class="ts" font-weight="bold">Legend</text>
    <line x1="0" y1="16" x2="28" y2="16" class="v12"/> <text x="34" y="20" class="ts">12 V</text>
    <line x1="0" y1="36" x2="28" y2="36" class="v5"/>  <text x="34" y="40" class="ts">+5.1 V</text>
    <line x1="0" y1="56" x2="28" y2="56" class="gnd"/> <text x="34" y="60" class="ts">GND</text>
    <line x1="0" y1="76" x2="28" y2="76" class="i2c"/> <text x="34" y="80" class="ts">I2C</text>
    <line x1="0" y1="96" x2="28" y2="96" class="pwm"/> <text x="34" y="100" class="ts">PWM</text>
  </g>

  <text x="450" y="636" text-anchor="middle" class="ts">Set XL4015 to 5.1 V before connecting loads · servos powered from the buck rail, not through the ESP32 · stagger servo start-up.</text>
</svg>
