<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 450" font-family="Segoe UI, Arial, sans-serif" role="img"><title>Standoff mounting — side elevation</title><desc>Side view: XL4015 and PCA9685 on tall nylon standoff pillars fixed to the breadboard chassis, with the VEML7700 fixed to the case lid on a detachable lead.</desc>
  <rect width="680" height="450" fill="#ffffff"/>
  <defs>
    <marker id="ah3" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4a5568"/></marker>
    <marker id="ah3s" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#4a5568"/></marker>
  </defs>
  <style>
    .t{fill:#1c2430;font-size:13px}.ts{fill:#4a5568;font-size:12px}.tt{fill:#4a5568;font-size:11px}.th{fill:#1c2430;font-size:13px;font-weight:bold}.title{fill:#1c2430;font-size:17px;font-weight:bold}
    .pil{fill:#efe7d6;stroke:#a89878;stroke-width:1.5}.wall{stroke:#9aa3ad;stroke-width:1.5;stroke-dasharray:6 4;fill:none}.ld{stroke:#9aa3ad;stroke-width:1;stroke-dasharray:3 3}
  </style>

  <text x="340" y="26" text-anchor="middle" class="title">Standoff mounting — side elevation</text>

  <path class="wall" d="M40,74 L40,410 M640,74 L640,410"/>
  <line x1="40" y1="72" x2="640" y2="72" stroke="#78909c" stroke-width="5"/>
  <rect x="452" y="60" width="12" height="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <rect x="474" y="60" width="12" height="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <rect x="496" y="60" width="12" height="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <rect x="518" y="60" width="12" height="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <rect x="540" y="60" width="12" height="8" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <text x="560" y="52" class="tt">vent slots in lid, over the XL4015</text>

  <line x1="40" y1="410" x2="640" y2="410" stroke="#1c2430" stroke-width="5"/>
  <text x="48" y="428" class="tt">case floor</text>

  <rect x="95" y="372" width="505" height="14" rx="2" fill="#efe9df" stroke="#8a8478" stroke-width="1.5"/>
  <text x="205" y="405" text-anchor="middle" class="th">copper breadboard — the chassis</text>
  <rect class="pil" x="130" y="386" width="10" height="24"/>
  <rect class="pil" x="555" y="386" width="10" height="24"/>
  <text x="300" y="405" text-anchor="middle" class="tt">board on M3 nylon feet from the floor</text>

  <rect x="150" y="70" width="70" height="16" rx="2" fill="#e6f2ea" stroke="#3f8a3f" stroke-width="1.5"/>
  <text x="185" y="83" text-anchor="middle" class="tt">VEML7700</text>
  <circle cx="160" cy="70" r="2.5" fill="#3f8a3f"/>
  <circle cx="210" cy="70" r="2.5" fill="#3f8a3f"/>
  <text x="228" y="82" class="tt">fixed to lid · M2 nylon</text>
  <path d="M160,86 L160,150 C120,160 120,200 160,210 L160,344 L290,344 L290,356" stroke="#1f6fd6" stroke-width="2" fill="none" marker-end="url(#ah3)"/>
  <text x="86" y="250" class="tt">detachable lead</text>
  <text x="86" y="266" class="tt">+ service loop</text>
  <rect x="270" y="356" width="42" height="16" rx="2" fill="#e8f0fb" stroke="#1f6fd6" stroke-width="1.5"/>
  <text x="291" y="368" text-anchor="middle" class="tt">J3</text>

  <rect x="112" y="346" width="145" height="26" rx="2" fill="#37474f"/>
  <text x="184" y="363" text-anchor="middle" fill="#ffffff" font-size="12">ESP32 (socketed)</text>

  <rect class="pil" x="205" y="300" width="9" height="72"/>
  <rect class="pil" x="342" y="300" width="9" height="72"/>
  <rect x="185" y="282" width="182" height="18" rx="2" fill="#e8f0fb" stroke="#1f4e9c" stroke-width="1.5"/>
  <text x="276" y="295" text-anchor="middle" class="th">PCA9685</text>
  <rect x="330" y="268" width="20" height="16" rx="2" fill="#546e7a"/>
  <text x="360" y="279" class="tt">bulk cap at V+</text>
  <text x="276" y="332" text-anchor="middle" class="tt">tall nylon standoff pillars → board</text>

  <rect class="pil" x="448" y="300" width="9" height="72"/>
  <rect class="pil" x="565" y="300" width="9" height="72"/>
  <rect x="420" y="282" width="190" height="18" rx="2" fill="#fff3e8" stroke="#c07a2a" stroke-width="1.5"/>
  <text x="515" y="295" text-anchor="middle" class="th">XL4015 buck</text>
  <rect x="440" y="262" width="6" height="20" fill="#b0bec5"/>
  <rect x="452" y="262" width="6" height="20" fill="#b0bec5"/>
  <rect x="464" y="262" width="6" height="20" fill="#b0bec5"/>
  <rect x="476" y="262" width="6" height="20" fill="#b0bec5"/>
  <rect x="488" y="262" width="6" height="20" fill="#b0bec5"/>
  <rect x="500" y="262" width="6" height="20" fill="#b0bec5"/>
  <text x="515" y="332" text-anchor="middle" class="tt">overhangs the board edge for airflow</text>

  <line x1="600" y1="262" x2="600" y2="74" stroke="#4a5568" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ah3)" marker-start="url(#ah3s)"/>
  <text x="608" y="165" class="tt">≥ 20 mm</text>
  <text x="608" y="181" class="tt">to the vent</text>

  <text x="340" y="446" text-anchor="middle" class="ts">nylon standoffs only where they touch copper — drill the board at the module holes, then meter-check no wanted strip is cut</text>
</svg>
