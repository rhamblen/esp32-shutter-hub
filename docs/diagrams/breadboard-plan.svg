<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 570" font-family="Segoe UI, Arial, sans-serif">
  <rect width="680" height="570" fill="#ffffff"/>
  <defs>
    <pattern id="holes" width="19.5" height="22" patternUnits="userSpaceOnUse">
      <circle cx="9.75" cy="11" r="2.2" fill="#b9b2a6"/>
    </pattern>
    <marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="context-stroke"/></marker>
  </defs>
  <style>
    .t{fill:#1c2430;font-size:13px}.ts{fill:#4a5568;font-size:12px}.tt{fill:#4a5568;font-size:11px}.tb{fill:#1c2430;font-size:14px;font-weight:bold}.title{fill:#1c2430;font-size:17px;font-weight:bold}
    .wr{fill:#ffffff;font-size:11px}
  </style>

  <text x="340" y="28" text-anchor="middle" class="title">Hub baseboard — plan view (30-column solderable breadboard)</text>

  <text x="18" y="62" class="ts">antenna overhangs the board edge — keep it off the copper</text>
  <line x1="43" y1="196" x2="43" y2="68" stroke="#9aa3ad" stroke-width="1" stroke-dasharray="3 3"/>

  <text x="58" y="80" text-anchor="middle" class="tt">1</text>
  <text x="136" y="80" text-anchor="middle" class="tt">5</text>
  <text x="233.5" y="80" text-anchor="middle" class="tt">10</text>
  <text x="331" y="80" text-anchor="middle" class="tt">15</text>
  <text x="428.5" y="80" text-anchor="middle" class="tt">20</text>
  <text x="526" y="80" text-anchor="middle" class="tt">25</text>
  <text x="623.5" y="80" text-anchor="middle" class="tt">30</text>

  <rect x="40" y="90" width="600" height="360" rx="6" fill="#efe9df" stroke="#8a8478" stroke-width="2"/>

  <line x1="58" y1="115" x2="623" y2="115" stroke="#d63b3b" stroke-width="3"/>
  <line x1="58" y1="135" x2="623" y2="135" stroke="#22303c" stroke-width="3"/>
  <line x1="58" y1="418" x2="623" y2="418" stroke="#8a3fd6" stroke-width="3"/>
  <line x1="58" y1="435" x2="623" y2="435" stroke="#22303c" stroke-width="3"/>
  <text x="10" y="119" class="tt" fill="#d63b3b" font-weight="bold">5.1 V</text>
  <text x="10" y="140" class="tt" fill="#22303c" font-weight="bold">GND</text>
  <text x="12" y="422" class="tt" fill="#8a3fd6" font-weight="bold">3V3</text>
  <text x="10" y="440" class="tt" fill="#22303c" font-weight="bold">GND</text>

  <rect x="48" y="164" width="585" height="110" fill="url(#holes)"/>
  <rect x="48" y="294" width="585" height="110" fill="url(#holes)"/>
  <text x="648" y="179" class="tt">a</text>
  <text x="648" y="268" class="tt">e</text>
  <text x="648" y="309" class="tt">f</text>
  <text x="648" y="398" class="tt">j</text>

  <path d="M409,166 L409,118" stroke="#d63b3b" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M390,166 L390,138" stroke="#22303c" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M97,402 L97,415" stroke="#8a3fd6" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M117,402 L117,432" stroke="#22303c" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M530,415 L530,355" stroke="#8a3fd6" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M560,432 L560,355" stroke="#22303c" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>

  <rect x="18" y="200" width="50" height="170" rx="4" fill="#546e7a"/>
  <text transform="rotate(-90 43 300)" x="43" y="304" text-anchor="middle" class="wr">antenna</text>
  <rect x="68" y="166" width="370" height="236" rx="6" fill="#37474f"/>
  <line x1="78" y1="176" x2="428" y2="176" stroke="#ffffff" stroke-width="4" stroke-dasharray="3 6"/>
  <line x1="78" y1="392" x2="428" y2="392" stroke="#ffffff" stroke-width="4" stroke-dasharray="3 6"/>
  <text x="253" y="270" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">ESP32 DevKit</text>
  <text x="253" y="292" text-anchor="middle" fill="#cfd8dc" font-size="12">socketed on female headers, cols 2–20</text>
  <text x="253" y="310" text-anchor="middle" fill="#cfd8dc" font-size="12">pins land in rows a &amp; j</text>
  <rect x="438" y="316" width="18" height="40" rx="2" fill="#90a4ae"/>
  <text transform="rotate(-90 447 336)" x="447" y="340" text-anchor="middle" class="wr" font-size="10">USB</text>

  <path d="M438,262 L555,262 L555,297" stroke="#1f6fd6" stroke-width="2" fill="none" marker-end="url(#ah2)"/>
  <path d="M438,278 L540,278 L540,297" stroke="#1f6fd6" stroke-width="2" fill="none" marker-end="url(#ah2)"/>
  <text x="445" y="258" class="tt" fill="#1f6fd6">SCL</text>
  <text x="445" y="292" class="tt" fill="#1f6fd6">SDA</text>

  <rect x="576" y="168" width="58" height="40" rx="3" fill="#dff0df" stroke="#3f8a3f" stroke-width="2"/>
  <text x="605" y="193" text-anchor="middle" class="tb">J1</text>
  <path d="M590,168 L590,118" stroke="#d63b3b" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>
  <path d="M620,168 L620,138" stroke="#22303c" stroke-width="2.5" fill="none" marker-end="url(#ah2)"/>

  <circle cx="546" cy="127" r="9" fill="#8d6e63" stroke="#5d4037" stroke-width="1.5"/>
  <text x="546" y="131" text-anchor="middle" class="wr" font-size="10">C1</text>

  <rect x="469" y="180" width="12" height="34" rx="2" fill="#f6e6c8" stroke="#b98a2e" stroke-width="1.5"/>
  <rect x="489" y="180" width="12" height="34" rx="2" fill="#f6e6c8" stroke="#b98a2e" stroke-width="1.5"/>
  <rect x="509" y="185" width="10" height="20" rx="2" fill="#cfd8dc" stroke="#78909c" stroke-width="1.5"/>
  <text x="494" y="232" text-anchor="middle" class="tt">R1 R2 C2</text>

  <rect x="517" y="300" width="58" height="52" rx="3" fill="#e8f0fb" stroke="#1f6fd6" stroke-width="2"/>
  <text x="546" y="322" text-anchor="middle" class="tb">J2</text>
  <text x="546" y="338" text-anchor="middle" class="tt">XH-5</text>
  <rect x="577" y="300" width="58" height="52" rx="3" fill="#e8f0fb" stroke="#1f6fd6" stroke-width="2"/>
  <text x="606" y="322" text-anchor="middle" class="tb">J3</text>
  <text x="606" y="338" text-anchor="middle" class="tt">XH-4</text>

  <text x="48" y="480" class="ts">J1 — 5.1 V logic spur in · 2-pin screw terminal</text>
  <text x="48" y="500" class="ts">J2 — XH-5 to PCA9685 · 3V3 GND SDA SCL OE</text>
  <text x="48" y="520" class="ts">J3 — XH-4 to VEML7700 · 3V3 GND SDA SCL</text>
  <text x="48" y="540" class="ts">R1 R2 + C2 — GPIO34 rail divider (optional)</text>
  <text x="356" y="480" class="ts">C1 — 470 µF + 100 nF rail decoupling</text>
  <text x="356" y="500" class="ts">top rails 5.1 V / GND · bottom rails 3V3 / GND</text>
  <text x="356" y="520" class="ts">solder under-module wires before the sockets</text>
  <text x="356" y="540" class="ts">30-pin DevKit: socket spans cols 2–16 instead</text>
</svg>
